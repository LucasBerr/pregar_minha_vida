<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncLife Architecture - Time Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar para manter a estética dark minimalista */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex justify-center items-center p-0 sm:p-4">

    <!-- Smartphone Wrapper Container -->
    <div class="w-full max-w-md bg-slate-900 min-h-screen sm:min-h-[840px] sm:rounded-3xl sm:border sm:border-slate-800 shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- Header Principal -->
        <header class="p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50 flex justify-between items-center">
            <div>
                <h1 class="text-sm font-bold tracking-wider text-indigo-400 flex items-center gap-1.5 uppercase">
                    <i data-lucide="layers" class="w-4 h-4"></i> SyncLife
                </h1>
                <p id="current-view-title" class="text-xs text-slate-400 mt-0.5">Dashboard Operacional</p>
            </div>
            <div class="bg-slate-800/80 px-2.5 py-1 rounded-full border border-slate-700/50 flex items-center gap-1">
                <i data-lucide="clock" class="w-3.5 h-3.5 text-indigo-400"></i>
                <span id="header-efficiency" class="text-[11px] font-mono font-bold text-slate-200">0% Efficient</span>
            </div>
        </header>

        <!-- Main Workspace (Conteúdo Rolável) -->
        <main class="flex-1 overflow-y-auto p-4 pb-24">
            
            <!-- ABA 1: DASHBOARD -->
            <section id="tab-dashboard" class="tab-content active space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/40 p-3 rounded-xl border border-slate-800 flex flex-col justify-between">
                        <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Total Planejado</span>
                        <span id="dash-total-planned" class="text-lg font-mono font-bold text-indigo-400 mt-1">0.0h</span>
                    </div>
                    <div class="bg-slate-800/40 p-3 rounded-xl border border-slate-800 flex flex-col justify-between">
                        <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Total Executado</span>
                        <span id="dash-total-real" class="text-lg font-mono font-bold text-emerald-400 mt-1">0.0h</span>
                    </div>
                </div>

                <!-- Gráficos Analíticos de KPIs -->
                <div class="bg-slate-800/30 p-3.5 rounded-xl border border-slate-800/80 space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                        <i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> Performance Semanal por KPI
                    </h3>
                    <div id="dashboard-kpi-charts" class="space-y-3 pt-1">
                        <!-- Gerado Dinamicamente -->
                    </div>
                </div>
            </section>

            <!-- ABA 2: KPIs -->
            <section id="tab-kpis" class="tab-content space-y-4">
                <form id="kpi-form" onsubmit="window.handleCreateKPI(event)" class="bg-slate-800/40 p-3.5 rounded-xl border border-slate-800 space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-indigo-400">Novo Indicador Operacional (KPI)</h3>
                    <div class="space-y-2">
                        <input type="text" id="kpi-title" placeholder="Nome do KPI (ex: Engenharia, Saúde)" required 
                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="kpi-target" placeholder="Meta Semanal (Horas)" required min="0.1" step="0.1"
                                class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200 font-mono">
                            <select id="kpi-color" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200">
                                <option value="indigo">Indigo</option>
                                <option value="emerald">Emerald</option>
                                <option value="amber">Amber</option>
                                <option value="rose">Rose</option>
                                <option value="cyan">Cyan</option>
                                <option value="violet">Violet</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 rounded-lg text-xs transition flex items-center justify-center gap-1">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Adicionar Indicador
                    </button>
                </form>

                <div class="space-y-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">KPIs Cadastrados</h3>
                    <div id="kpi-list" class="space-y-2">
                        <!-- Gerado Dinamicamente -->
                    </div>
                </div>
            </section>

            <!-- ABA 3: AGENDA (CRONOGRAMA SEMANAL) -->
            <section id="tab-agenda" class="tab-content space-y-4">
                <form id="agenda-form" onsubmit="window.handleCreateEvent(event)" class="bg-slate-800/40 p-3.5 rounded-xl border border-slate-800 space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-indigo-400">Alocar Bloco de Tempo</h3>
                    <div class="space-y-2">
                        <input type="text" id="event-title" placeholder="Nome da Atividade" required 
                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="event-day" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200">
                                <option value="Segunda">Segunda-feira</option>
                                <option value="Terça">Terça-feira</option>
                                <option value="Quarta">Quarta-feira</option>
                                <option value="Quinta">Quinta-feira</option>
                                <option value="Sexta">Sexta-feira</option>
                            </select>
                            <input type="number" id="event-duration" placeholder="Duração (Minutos)" required min="5"
                                class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200 font-mono">
                        </div>
                        <select id="event-kpi-link" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200">
                            <!-- Injetado via JS de acordo com os KPIs existentes -->
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 rounded-lg text-xs transition flex items-center justify-center gap-1">
                        <i data-lucide="calendar-plus" class="w-3.5 h-3.5"></i> Agendar Atividade
                    </button>
                </form>

                <!-- Visualização e Filtro de Agenda Semanal -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Grade Semanal</h3>
                        <select id="agenda-filter-day" onchange="window.renderAgendaView()" class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-[11px] text-slate-300 focus:outline-none">
                            <option value="Todos">Ver Semana Toda</option>
                            <option value="Segunda">Segunda</option>
                            <option value="Terça">Terça</option>
                            <option value="Quarta">Quarta</option>
                            <option value="Quinta">Quinta</option>
                            <option value="Sexta">Sexta</option>
                        </select>
                    </div>
                    <div id="agenda-list" class="space-y-2">
                        <!-- Gerado Dinamicamente -->
                    </div>
                </div>
            </section>

            <!-- ABA 4: AUDITORIA OPERACIONAL -->
            <section id="tab-auditoria" class="tab-content space-y-4">
                <!-- Seletor Rápido de Dias Úteis -->
                <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800 justify-between items-center text-center">
                    <button onclick="window.setAuditoriaDay('Segunda')" id="day-btn-Segunda" class="flex-1 py-1.5 text-[11px] font-medium rounded-lg transition text-slate-400">Seg</button>
                    <button onclick="window.setAuditoriaDay('Terça')" id="day-btn-Terça" class="flex-1 py-1.5 text-[11px] font-medium rounded-lg transition text-slate-400">Ter</button>
                    <button onclick="window.setAuditoriaDay('Quarta')" id="day-btn-Quarta" class="flex-1 py-1.5 text-[11px] font-medium rounded-lg transition text-slate-400">Qua</button>
                    <button onclick="window.setAuditoriaDay('Quinta')" id="day-btn-Quinta" class="flex-1 py-1.5 text-[11px] font-medium rounded-lg transition text-slate-400">Qui</button>
                    <button onclick="window.setAuditoriaDay('Sexta')" id="day-btn-Sexta" class="flex-1 py-1.5 text-[11px] font-medium rounded-lg transition text-slate-400">Sex</button>
                </div>

                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                        <i data-lucide="clipboard-check" class="w-3.5 h-3.5 text-indigo-400"></i> Blocos Planejados para o Dia
                    </h3>
                    <button onclick="window.validateAllAsPlanned()" class="text-[10px] font-semibold text-indigo-400 hover:text-indigo-300 flex items-center gap-1 bg-indigo-950/40 px-2 py-1 rounded border border-indigo-900/40">
                        <i data-lucide="check-check" class="w-3 h-3"></i> Validar Tudo
                    </button>
                </div>

                <!-- Lista de Cards para Ajuste de Tempo -->
                <div id="auditoria-list" class="space-y-2">
                    <!-- Gerado Dinamicamente -->
                </div>
            </section>

        </main>

        <!-- Barra de Navegação Inferior Fixa (Estilo Mobile Dock) -->
        <nav class="absolute bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-800 grid grid-cols-4 py-2.5 px-2 backdrop-blur z-50">
            <button onclick="window.switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1 text-indigo-500 transition">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Dashboard</span>
            </button>
            <button onclick="window.switchTab('kpis')" id="nav-kpis" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition">
                <i data-lucide="target" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">KPIs</span>
            </button>
            <button onclick="window.switchTab('agenda')" id="nav-agenda" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Agenda</span>
            </button>
            <button onclick="window.switchTab('auditoria')" id="nav-auditoria" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition">
                <i data-lucide="sliders" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Auditoria</span>
            </button>
        </nav>
    </div>

    <!-- Módulo Central de Dados e Lógica Computacional -->
    <script type="module">
        // Variáveis Globais de Estado
        let kpis = JSON.parse(localStorage.getItem('SL_KPIS')) || [];
        let calendarEvents = JSON.parse(localStorage.getItem('SL_EVENTS')) || [];
        let activeTab = 'dashboard';
        let activeAuditoriaDay = 'Segunda';

        // Mapeamento de variantes de cores Tailwind seguras contra purga do compilador
        const colorMap = {
            indigo: { bg: 'bg-indigo-500', text: 'text-indigo-400', border: 'border-indigo-500/20', raw: '#6366f1', fill: 'bg-indigo-950/30' },
            emerald: { bg: 'bg-emerald-500', text: 'text-emerald-400', border: 'border-emerald-500/20', raw: '#10b981', fill: 'bg-emerald-950/30' },
            amber: { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500/20', raw: '#f59e0b', fill: 'bg-amber-950/30' },
            rose: { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500/20', raw: '#f43f5e', fill: 'bg-rose-950/30' },
            cyan: { bg: 'bg-cyan-500', text: 'text-cyan-400', border: 'border-cyan-500/20', raw: '#06b6d4', fill: 'bg-cyan-950/30' },
            violet: { bg: 'bg-violet-500', text: 'text-violet-400', border: 'border-violet-500/20', raw: '#8b5cf6', fill: 'bg-violet-950/30' }
        };

        // Persistência Atômica de Estado
        function saveStateToStorage() {
            localStorage.setItem('SL_KPIS', JSON.stringify(kpis));
            localStorage.setItem('SL_EVENTS', JSON.stringify(calendarEvents));
        }

        // Engine de Renderização e Chaveamento de Abas
        function switchTab(tabId) {
            activeTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');

            // Atualização dos botões da Bottom Bar
            ['dashboard', 'kpis', 'agenda', 'auditoria'].forEach(t => {
                const navBtn = document.getElementById(`nav-${t}`);
                if(t === tabId) {
                    navBtn.className = "flex flex-col items-center gap-1 text-indigo-500 transition";
                } else {
                    navBtn.className = "flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition";
                }
            });

            // Títulos e triggers contextuais de renderização
            const titles = { dashboard: "Dashboard Operacional", kpis: "Indicadores Estratégicos", agenda: "Cronograma de Rotina", auditoria: "Auditoria de Atividades" };
            document.getElementById('current-view-title').innerText = titles[tabId];

            if(tabId === 'agenda') updateKpiDropdownOptions();
            
            recalculateAndSyncUI();
        }

        // Atualiza dinamicamente o select de vínculo na criação de eventos da agenda
        function updateKpiDropdownOptions() {
            const selectEl = document.getElementById('event-kpi-link');
            if(!selectEl) return;
            if(kpis.length === 0) {
                selectEl.innerHTML = '<option value="">Nenhum KPI cadastrado. Crie um primeiro!</option>';
                return;
            }
            selectEl.innerHTML = kpis.map(k => `<option value="${k.id}">${k.name} (Meta: ${k.target}h)</option>`).join('');
        }

        // CRUD: Criação de Indicadores Estratégicos (KPIs)
        function handleCreateKPI(e) {
            e.preventDefault();
            const name = document.getElementById('kpi-title').value.trim();
            const target = parseFloat(document.getElementById('kpi-target').value);
            const color = document.getElementById('kpi-color').value;

            if(!name || isNaN(target)) return;

            const newKpi = { id: 'kpi_' + Date.now(), name, target, color };
            kpis.push(newKpi);
            saveStateToStorage();
            
            document.getElementById('kpi-form').reset();
            recalculateAndSyncUI();
        }

        function deleteKPI(kpiId) {
            kpis = kpis.filter(k => k.id !== kpiId);
            // Cascateamento preventivo: desvincula eventos órfãos
            calendarEvents = calendarEvents.filter(ev => ev.manualKpiId !== kpiId);
            saveStateToStorage();
            recalculateAndSyncUI();
        }

        // CRUD: Alocação de Blocos de Tempo Semanais (Agenda)
        function handleCreateEvent(e) {
            e.preventDefault();
            const title = document.getElementById('event-title').value.trim();
            const day = document.getElementById('event-day').value;
            const duration = parseInt(document.getElementById('event-duration').value);
            const kpiId = document.getElementById('event-kpi-link').value;

            if(!title || isNaN(duration) || !kpiId) return;

            const newEvent = {
                id: 'ev_' + Date.now(),
                day,
                title,
                plannedMinutes: duration,
                realMinutes: 0,
                status: 'pending', // pending, validated, altered
                manualKpiId: kpiId
            };

            calendarEvents.push(newEvent);
            saveStateToStorage();

            document.getElementById('agenda-form').reset();
            updateKpiDropdownOptions();
            recalculateAndSyncUI();
        }

        function deleteEvent(eventId) {
            calendarEvents = calendarEvents.filter(ev => ev.id !== eventId);
            saveStateToStorage();
            recalculateAndSyncUI();
        }

        // Núcleo de Controle da Aba de Auditoria
        function setAuditoriaDay(day) {
            activeAuditoriaDay = day;
            renderAuditoriaView();
        }

        function adjustTime(eventId, deltaMinutes) {
            const ev = calendarEvents.find(e => e.id === eventId);
            if(!ev) return;
            
            // Se o estado era pendente, inicializa o real com a estimativa planejada antes do ajuste
            if(ev.status === 'pending') {
                ev.realMinutes = ev.plannedMinutes;
            }
            
            ev.realMinutes = Math.max(0, ev.realMinutes + deltaMinutes);
            ev.status = 'altered';
            
            saveStateToStorage();
            recalculateAndSyncUI();
        }

        function validateEvent(eventId) {
            const ev = calendarEvents.find(e => e.id === eventId);
            if(!ev) return;
            
            ev.realMinutes = ev.plannedMinutes;
            ev.status = 'validated';
            
            saveStateToStorage();
            recalculateAndSyncUI();
        }

        function validateAllAsPlanned() {
            calendarEvents.forEach(ev => {
                if(ev.day === activeAuditoriaDay && ev.status === 'pending') {
                    ev.realMinutes = ev.plannedMinutes;
                    ev.status = 'validated';
                }
            });
            saveStateToStorage();
            recalculateAndSyncUI();
        }

        // Motor Analítico de Cálculo de Métricas e Sincronização de UI
        function recalculateAndSyncUI() {
            // Renderizações por aba específica dependendo do contexto visível
            renderKPIView();
            renderAgendaView();
            renderAuditoriaView();
            renderDashboardView();

            // Computação da Eficiência Geral no Header (Real / Planejado Geral)
            let totalPlannedMin = 0;
            let totalRealMin = 0;

            calendarEvents.forEach(ev => {
                totalPlannedMin += ev.plannedMinutes;
                totalRealMin += ev.realMinutes;
            });

            const efficiency = totalPlannedMin > 0 ? Math.round((totalRealMin / totalPlannedMin) * 100) : 0;
            document.getElementById('header-efficiency').innerText = `${efficiency}% Efficient`;
            
            // Força remontagem estrutural dos ícones dinâmicos do Lucide
            lucide.createIcons();
        }

        // Sub-Renderizador: Dashboard Analítico
        function renderDashboardView() {
            let totalPlannedMin = 0;
            let totalRealMin = 0;
            
            // Inicializa acumuladores analíticos indexados por ID de KPI
            const stats = {};
            kpis.forEach(k => {
                stats[k.id] = { planned: 0, real: 0 };
            });

            calendarEvents.forEach(ev => {
                totalPlannedMin += ev.plannedMinutes;
                totalRealMin += ev.realMinutes;
                if(stats[ev.manualKpiId]) {
                    stats[ev.manualKpiId].planned += ev.plannedMinutes;
                    stats[ev.manualKpiId].real += ev.realMinutes;
                }
            });

            document.getElementById('dash-total-planned').innerText = `${(totalPlannedMin/60).toFixed(1)}h`;
            document.getElementById('dash-total-real').innerText = `${(totalRealMin/60).toFixed(1)}h`;

            const chartContainer = document.getElementById('dashboard-kpi-charts');
            if(kpis.length === 0) {
                chartContainer.innerHTML = `<p class="text-xs text-slate-500 italic py-2 text-center">Nenhum dado analítico disponível para computação.</p>`;
                return;
            }

            chartContainer.innerHTML = kpis.map(k => {
                const kpiStat = stats[k.id] || { planned: 0, real: 0 };
                const realHours = kpiStat.real / 60;
                const targetHours = k.target;
                
                // Cálculo de preenchimento relativo à meta do KPI
                const progressPercent = targetHours > 0 ? Math.min(100, Math.round((realHours / targetHours) * 100)) : 0;
                const palette = colorMap[k.color] || colorMap.indigo;

                return `
                    <div class="space-y-1.5">
                        <div class="flex justify-between text-[11px]">
                            <span class="font-medium text-slate-300 flex items-center gap-1.5">
                                <span class="w-2 h-2 rounded-full ${palette.bg}"></span> ${k.name}
                            </span>
                            <span class="font-mono text-slate-400">
                                <strong class="${palette.text}">${realHours.toFixed(1)}h</strong> / ${targetHours.toFixed(1)}h meta
                            </span>
                        </div>
                        <div class="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-800 flex">
                            <div class="${palette.bg} h-full rounded-full transition-all duration-500" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Sub-Renderizador: Gerenciamento de KPIs
        function renderKPIView() {
            const listEl = document.getElementById('kpi-list');
            if(kpis.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-slate-500 italic text-center py-4">Nenhum indicador parametrizado no LocalStorage.</p>`;
                return;
            }

            listEl.innerHTML = kpis.map(k => {
                const palette = colorMap[k.color] || colorMap.indigo;
                return `
                    <div class="bg-slate-800/20 p-2.5 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full ${palette.bg} shadow-sm"></span>
                            <div>
                                <h4 class="text-xs font-semibold text-slate-200">${k.name}</h4>
                                <p class="text-[10px] text-slate-400 font-mono">Meta: ${k.target}h/semana</p>
                            </div>
                        </div>
                        <button onclick="window.deleteKPI('${k.id}')" class="p-1.5 hover:bg-slate-800 rounded-lg text-slate-500 hover:text-rose-400 transition">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Sub-Renderizador: Criação e Listagem da Grade Horária (Agenda)
        function renderAgendaView() {
            const listEl = document.getElementById('agenda-list');
            const filterDay = document.getElementById('agenda-filter-day').value;

            // Filtra os eventos de acordo com o dia selecionado
            const filteredEvents = calendarEvents.filter(ev => filterDay === 'Todos' || ev.day === filterDay);

            if(filteredEvents.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-slate-500 italic text-center py-4">Nenhum bloco de tempo alocado para este filtro.</p>`;
                return;
            }

            listEl.innerHTML = filteredEvents.map(ev => {
                const linkedKpi = kpis.find(k => k.id === ev.manualKpiId);
                const kpiName = linkedKpi ? linkedKpi.name : 'Sem KPI';
                const palette = linkedKpi ? colorMap[linkedKpi.color] : colorMap.indigo;

                return `
                    <div class="p-2.5 rounded-xl border ${palette.border} ${palette.fill} flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-1.5">
                                <span class="text-[9px] font-bold uppercase px-1.5 py-0.5 rounded ${palette.bg} text-slate-950">${ev.day}</span>
                                <h4 class="text-xs font-bold text-slate-200">${ev.title}</h4>
                            </div>
                            <p class="text-[10px] text-slate-400 mt-1 flex items-center gap-1">
                                <i data-lucide="tag" class="w-2.5 h-2.5"></i> ${kpiName} • <span class="font-mono text-slate-300">${ev.plannedMinutes} min</span>
                            </p>
                        </div>
                        <button onclick="window.deleteEvent('${ev.id}')" class="p-1.5 hover:bg-slate-800/80 rounded-lg text-slate-500 hover:text-rose-400 transition">
                            <i data-lucide="calendar-range" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Sub-Renderizador: Validação e Computação Diária (Auditoria)
        function renderAuditoriaView() {
            // Atualiza estado visual do seletor de dias da semana
            ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'].forEach(d => {
                const btn = document.getElementById(`day-btn-${d}`);
                if(d === activeAuditoriaDay) {
                    btn.className = "flex-1 py-1.5 text-[11px] font-bold rounded-lg bg-slate-800 text-indigo-400 border border-slate-700/50 shadow";
                } else {
                    btn.className = "flex-1 py-1.5 text-[11px] font-medium rounded-lg text-slate-400 hover:text-slate-200 transition";
                }
            });

            const listEl = document.getElementById('auditoria-list');
            const dayEvents = calendarEvents.filter(ev => ev.day === activeAuditoriaDay);

            if(dayEvents.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-8 px-4 border border-dashed border-slate-800 rounded-xl">
                        <i data-lucide="calendar-days" class="w-6 h-6 text-slate-600 mx-auto mb-2"></i>
                        <p class="text-xs text-slate-500 italic">Nenhum compromisso planejado para esta data na aba Agenda.</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = dayEvents.map(ev => {
                const linkedKpi = kpis.find(k => k.id === ev.manualKpiId);
                const palette = linkedKpi ? colorMap[linkedKpi.color] : colorMap.indigo;
                
                // Determinação dinâmica do status de conformidade
                let statusBadge = '';
                if(ev.status === 'validated') {
                    statusBadge = `<span class="text-[9px] bg-emerald-950 text-emerald-400 border border-emerald-900 px-1.5 py-0.5 rounded font-medium flex items-center gap-0.5"><i data-lucide="check" class="w-2.5 h-2.5"></i> Ok</span>`;
                } else if(ev.status === 'altered') {
                    statusBadge = `<span class="text-[9px] bg-amber-950 text-amber-400 border border-amber-900 px-1.5 py-0.5 rounded font-medium flex items-center gap-0.5"><i data-lucide="alert-circle" class="w-2.5 h-2.5"></i> Auditado</span>`;
                } else {
                    statusBadge = `<span class="text-[9px] bg-slate-800 text-slate-400 border border-slate-700 px-1.5 py-0.5 rounded font-medium flex items-center gap-0.5"><i data-lucide="clock" class="w-2.5 h-2.5"></i> Pendente</span>`;
                }

                const currentDisplayMinutes = ev.status === 'pending' ? ev.plannedMinutes : ev.realMinutes;

                return `
                    <div class="bg-slate-900 border border-slate-800/80 rounded-xl p-3 flex flex-col justify-between gap-3 shadow-inner">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-xs font-bold text-slate-200">${ev.title}</h4>
                                <div class="flex items-center gap-1.5 mt-1">
                                    <span class="w-1.5 h-1.5 rounded-full ${palette.bg}"></span>
                                    <p class="text-[10px] text-slate-400">Planejado: <span class="font-mono text-slate-300">${ev.plannedMinutes}m</span></p>
                                </div>
                            </div>
                            ${statusBadge}
                        </div>

                        <div class="flex items-center justify-between bg-slate-950/60 p-1.5 rounded-lg border border-slate-800/60">
                            <span class="text-[10px] font-medium text-slate-400 pl-1">Tempo Real:</span>
                            <div class="flex items-center gap-1">
                                <button onclick="window.adjustTime('${ev.id}', -15)" class="w-7 h-7 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-md text-xs font-bold transition text-slate-300">-15</button>
                                <span class="w-16 text-center font-mono text-xs font-bold text-indigo-400">${currentDisplayMinutes}m</span>
                                <button onclick="window.adjustTime('${ev.id}', 15)" class="w-7 h-7 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-md text-xs font-bold transition text-slate-300">+15</button>
                                <button onclick="window.validateEvent('${ev.id}')" class="w-7 h-7 bg-indigo-950/80 hover:bg-indigo-900 border border-indigo-900/50 rounded-md transition text-indigo-400 flex items-center justify-center ml-1" title="Validar Tempo Planejado">
                                    <i data-lucide="check" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Encapsulamento Seguro de Escopo Global para Vinculação no HTML
        window.switchTab = switchTab;
        window.handleCreateKPI = handleCreateKPI;
        window.deleteKPI = deleteKPI;
        window.handleCreateEvent = handleCreateEvent;
        window.deleteEvent = deleteEvent;
        window.setAuditoriaDay = setAuditoriaDay;
        window.adjustTime = adjustTime;
        window.validateEvent = validateEvent;
        window.validateAllAsPlanned = validateAllAsPlanned;
        window.renderAgendaView = renderAgendaView;

        // Inicialização do Lifecycle da Aplicação
        window.addEventListener('DOMContentLoaded', () => {
            recalculateAndSyncUI();
        });
    </script>
</body>
</html>
